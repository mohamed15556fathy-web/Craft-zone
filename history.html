<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><title>سجل الورق</title><style>
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;padding:20px}.container{max-width:1100px;margin:auto;background:#fff;padding:20px;border-radius:16px}
table{width:100%;border-collapse:collapse}th,td{padding:12px;border-bottom:1px solid #ddd;text-align:center}th{background:#3498db;color:#fff}.add{color:#27ae60;font-weight:700}.sub{color:#e74c3c;font-weight:700}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);padding:20px}.box{background:#fff;max-width:700px;margin:50px auto;padding:20px;border-radius:14px}
</style></head><body><div class="container"><div style="display:flex;justify-content:space-between;align-items:center"><h2>📜 سجل مخزن الورق</h2><a href="inventory.html">⬅️ العودة</a></div><table><thead><tr><th>الوقت</th><th>رقم الصنف</th><th>الصنف</th><th>النوع</th><th>الوزن</th><th>الأفرخ</th><th>الملاحظة</th></tr></thead><tbody id="hBody"></tbody></table></div>
<div class="modal" id="modal"><div class="box"><div id="details"></div><div style="margin-top:10px"><button onclick="modal.style.display='none'">إغلاق</button></div></div></div>
<script>
const token=localStorage.getItem('token'); const user=JSON.parse(localStorage.getItem('user')||'null'); if(!token||!user) location.href='login.html'; if(user.role!=='admin' && !Number(user.perm_view_inventory||0)) location.href='index.html'; if(user.role!=='admin' && !Number(user.perm_view_inventory||0)) location.href='index.html';
function authFetch(url){return fetch(url,{headers:{Authorization:'Bearer '+token}}).then(async r=>{const d=await r.json(); if(r.status===401){localStorage.clear();location.href='login.html'; throw new Error('u')} if(!r.ok) throw new Error(d.error||'error'); return d})}
function typeText(h){ if(h.type==='add') return 'إضافة'; if(h.type==='sub') return 'خصم'; if(h.type==='edit') return 'تعديل'; return h.type||''; }
function showNote(note){ let html=''; if(String(note||'').includes(' | ')){ html='<h3>تفاصيل التعديل</h3><ul style="line-height:2">'+String(note).split(' | ').map(x=>`<li>${x}</li>`).join('')+'</ul>'; } else { let obj=null; try{obj=JSON.parse(note)}catch(e){} if(obj&&obj.before&&obj.after){ const labels={length:'الطول',width:'العرض',gusset:'الجنب',grammage:'الجرام',color:'اللون',handle:'اليد',qty:'الرصيد',total_qty:'الرصيد',total_kg:'الرصيد كجم',total_sheets:'الرصيد فرخ',min_qty:'الحد الأدنى',min_kg:'حد أدنى كجم',min_sheets:'حد أدنى فرخ',buy_price:'سعر الشراء',sell_price:'سعر البيع',buy_price_kg:'سعر الكيلو',buy_price_sheet:'سعر الفرخ'}; const items=[]; const keys=new Set([...Object.keys(obj.before||{}),...Object.keys(obj.after||{})]); keys.forEach(k=>{ if(String(obj.before?.[k]??'')!==String(obj.after?.[k]??'')) items.push(`<li>${labels[k]||k}: ${obj.before?.[k]??'-'} → ${obj.after?.[k]??'-'}</li>`); }); html='<h3>تفاصيل التعديل</h3><ul style="line-height:2">'+(items.join('')||'<li>لا توجد فروق</li>')+'</ul>'; } else { html='<div>'+ (note||'لا توجد تفاصيل') +'</div>'; } } details.innerHTML=html; modal.style.display='block'; }
async function loadH(){const data=await authFetch('/get-paper-history'); hBody.innerHTML=data.length?data.map(h=>`<tr><td>${h.date}</td><td>#${h.paper_id}</td><td>${h.color||''} ${h.length||''}×${h.width||''} - ${h.grammage||''} جم</td><td class="${h.type==='add'?'add':(h.type==='sub'?'sub':'')}">${typeText(h)}</td><td>${Math.abs(h.kg||0).toFixed(2)}</td><td>${Math.round(Math.abs(h.sheets||0))}</td><td>${h.type==='edit'?`<button data-note='${encodeURIComponent(h.note||'')}' onclick='showNote(decodeURIComponent(this.dataset.note))'>تعديل</button>`:(h.note||'')}</td></tr>`).join(''):'<tr><td colspan="7">لا يوجد سجل</td></tr>'} loadH();
</script></body></html>
