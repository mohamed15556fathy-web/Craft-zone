<!DOCTYPE html><html dir="rtl"><head><script id="auth-flicker-guard">(function(){try{var p=location.pathname.toLowerCase();if(p.endsWith('/login.html')||p==='/'||p===''){return;}if(!localStorage.getItem('token')||!localStorage.getItem('user')){location.replace('login.html');return;}document.documentElement.classList.add('auth-loading');}catch(e){location.replace('login.html');}})();</script><style id="auth-flicker-style">html.auth-loading body{visibility:hidden!important}html.auth-ready body{visibility:visible}</style><meta charset="UTF-8"><title>مخزن اليد</title><style>:root{--bg:#0f172a;--panel:#1e293b;--text:#f1f5f9;--border:#334155;--cyan:#22d3ee}body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);padding:20px}.container{max-width:1000px;margin:auto}.card,table{background:var(--panel);border:1px solid var(--border);border-radius:14px}.card{padding:18px;margin-bottom:18px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}input,select{background:#0f172a;color:#fff;border:1px solid var(--border);padding:10px;border-radius:8px}button,a.btn{border:none;background:var(--cyan);color:#000;padding:10px 16px;border-radius:8px;cursor:pointer;font-weight:700;text-decoration:none}table{width:100%;border-collapse:collapse}th,td{padding:12px;border-bottom:1px solid var(--border);text-align:center}th{background:#111827;color:#94a3b8}.hidden{display:none}.badge{padding:4px 10px;border-radius:999px;background:#0b1220;border:1px solid var(--border)}.mini-btn{padding:6px 11px;border-radius:10px;min-width:38px}.danger{background:#fb7185;color:#111827}.actions{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap}</style></head><body><div class="container"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px"><h2>🧵 مخزن اليد</h2><div style="display:flex;gap:10px"><button onclick="toggleHistory()">📜 السجل</button><a class="btn" href="bags.html">👜 مخزن الشنط</a><a class="btn" href="index.html">🏠 الرئيسية</a></div></div><div class="card"><div class="grid"><input id="edit_id" type="hidden"><select id="handleType"><option>مجدول</option><option>دوباره</option><option>ستان</option></select><select id="handleColor" onchange="updateHandleColorMode()"><option value="بني">بني</option><option value="أبيض">أبيض</option><option value="أسود">أسود</option><option value="أخرى">أخرى</option></select><input id="handleColorOther" class="hidden" placeholder="اكتب اللون"><input id="handleQty" type="number" placeholder="الكمية"><input id="handleBuyPrice" type="number" placeholder="سعر الشراء"><input id="handleMinQty" type="number" placeholder="الحد الأدنى"><button onclick="saveHandle()">إضافة/تحديث</button></div></div><table><thead><tr><th>النوع</th><th>اللون</th><th>الرصيد</th><th>الحد الأدنى</th><th>سعر الشراء</th><th class="purchase-total-col">إجمالي القيمة</th><th>عملية</th><th>تعديل</th></tr></thead><tbody id="handlesBody"></tbody></table><div class='purchase-total-col' style='margin-top:10px;font-weight:bold'>إجمالي قيمة المخزون: <span id='totalVal'>0</span></div><div id="historyWrap" class="card hidden" style="margin-top:18px"><div style="display:flex;justify-content:space-between;align-items:center"><h3 style="margin:0">سجل اليد</h3><span class="badge">آخر 500 حركة</span></div><table><thead><tr><th>التاريخ</th><th>خامة اليد</th><th>اللون</th><th>النوع</th><th>الكمية</th><th>التفاصيل</th></tr></thead><tbody id="historyBody"></tbody></table></div></div><script>const token=localStorage.getItem('token');const user=JSON.parse(localStorage.getItem('user')||'null');if(!token||!user)location.href='login.html';if(user.username!=='admin'&&!Number(user.perm_view_handles||0))location.href='index.html';const canViewPurchaseTotals=user.username==='admin'||Number(user.perm_view_purchase_totals||0)===1;let rows=[];function authFetch(url,opts={}){opts.headers=Object.assign({},opts.headers||{},{Authorization:'Bearer '+token});return fetch(url,opts).then(async r=>{const data=await r.json().catch(()=>({}));if(r.status===401){localStorage.clear();location.href='login.html';throw new Error('unauthorized')}if(!r.ok)throw new Error(data.error||'error');return data;});}function money(v){return Number(v||0).toLocaleString('en-US',{maximumFractionDigits:2})+' ج';}function applyPricingVisibility(){document.querySelectorAll('.purchase-total-col').forEach(el=>el.classList.toggle('hidden',!canViewPurchaseTotals));}function updateHandleColorMode(){const other=handleColor.value==='أخرى';handleColorOther.classList.toggle('hidden',!other);if(other)setTimeout(()=>handleColorOther.focus(),0);}function resolveHandleColor(){return handleColor.value==='أخرى'?String(handleColorOther.value||'').trim():String(handleColor.value||'').trim();}function setHandleColorValue(value){const v=String(value||'').trim();const opts=Array.from(handleColor.options).map(o=>o.value);if(opts.includes(v)){handleColor.value=v;handleColorOther.value='';}else{handleColor.value='أخرى';handleColorOther.value=v;}updateHandleColorMode();}function toggleHistory(){historyWrap.classList.toggle('hidden');if(!historyWrap.classList.contains('hidden'))loadHistory();}async function loadHandles(){applyPricingVisibility();rows=await authFetch('/get-handles');let total=0;handlesBody.innerHTML=rows.map(h=>{const val=h.total_purchase_price!==undefined?Number(h.total_purchase_price||0):Number(h.qty||0)*Number(h.buy_price||0);total+=val;const totalCell=canViewPurchaseTotals?`<td class="purchase-total-col">${money(val)}</td>`:'';return `<tr><td>${h.handle_type||'مجدول'}</td><td>${h.color}</td><td>${h.qty}</td><td>${h.min_qty||0}</td><td>${money(h.buy_price)}</td>${totalCell}<td><div class="actions"><button class="mini-btn" onclick="adjustHandle(${h.id},1)">+</button><button class="mini-btn danger" onclick="adjustHandle(${h.id},-1)">-</button></div></td><td><button onclick="editHandle(${h.id})">✏️</button></td></tr>`}).join('');if(totalVal)totalVal.innerText=money(total);applyPricingVisibility();}function editHandle(id){const h=rows.find(x=>x.id===id);if(!h)return;edit_id.value=h.id;handleType.value=h.handle_type||'مجدول';setHandleColorValue(h.color);handleQty.value=h.qty;handleBuyPrice.value=h.buy_price||0;handleMinQty.value=h.min_qty||0;window.scrollTo({top:0,behavior:'smooth'});}async function adjustHandle(id,dir){const h=rows.find(x=>x.id===id);if(!h)return;const label=dir>0?'زيادة':'خصم';const raw=prompt(`اكتب كمية ${label} لليد ${h.color}`, '1');if(raw===null)return;const qty=Math.abs(Number(raw)||0);if(!qty){alert('اكتب كمية صحيحة');return;}try{await authFetch('/add-handle',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({color:h.color,handle_type:h.handle_type||'مجدول',qty:dir>0?qty:-qty,buy_price:h.buy_price||0,min_qty:h.min_qty||0})});await loadHandles();await loadHistory();}catch(e){alert('خطأ: '+e.message)}}async function saveHandle(){try{await authFetch('/add-handle',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({edit_id:edit_id.value||undefined,color:resolveHandleColor(),handle_type:handleType.value,qty:handleQty.value||0,buy_price:handleBuyPrice.value||0,min_qty:handleMinQty.value||0})});edit_id.value='';handleColorOther.value='';updateHandleColorMode();handleQty.value='';handleBuyPrice.value='';handleMinQty.value='';loadHandles();loadHistory();}catch(e){alert('خطأ: '+e.message)}}async function loadHistory(){const data=await authFetch('/get-handles-history');historyBody.innerHTML=data.length?data.map(h=>`<tr><td>${new Date(h.date).toLocaleString('ar-EG')}</td><td>${h.handle_type||'مجدول'}</td><td>${h.color||''}</td><td>${h.type==='add'?'إضافة':h.type==='sub'?'خصم':h.type==='purchase'?'مشتريات':h.type==='purchase-reverse'?'عكس مشتريات':'تعديل'}</td><td>${h.qty||0}</td><td>${h.order_id?`أوردر #${h.order_id}<br><small>${h.note||''}</small>`:(h.note||'-')}</td></tr>`).join(''):'<tr><td colspan="5">لا يوجد سجل</td></tr>';}applyPricingVisibility();updateHandleColorMode();loadHandles();loadHistory();</script><script src="idle_guard.js"></script><script id="auth-flicker-release">(function(){function done(){document.documentElement.classList.remove('auth-loading');document.documentElement.classList.add('auth-ready');}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',done,{once:true});}else{done();}setTimeout(done,1200);})();</script></body></html>
